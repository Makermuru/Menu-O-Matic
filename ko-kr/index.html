<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐먹지?</title>
  <link rel="icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180x180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="뭐먹지">
  <meta name="theme-color" content="#0e0e10">
  <link rel="stylesheet" href="ko-kr.css">
</head>
<body class="img">
  <audio id="sound" src="tap.mp3"></audio>

  <button id="theme-btn" class="theme-toggle jua" aria-label="테마 전환">🌙 다크</button>

  <div class="title-area">
    <p class="title-sup jua">오늘의 메뉴 추천</p>
    <h1 class="jua">오늘 뭐먹지?</h1>
    <p class="title-sub jua">지금 기분이 어때요?</p>
  </div>

  <div class="buttons">
    <button class="liquid jua" data-f="happy">
      <span class="btn-emoji">😄</span>
      <span class="btn-label">행복해</span>
      <span class="btn-sub">신나는 날</span>
    </button>
    <button class="liquid jua" data-f="sad">
      <span class="btn-emoji">😢</span>
      <span class="btn-label">슬퍼</span>
      <span class="btn-sub">우울한 날</span>
    </button>
    <button class="liquid jua" data-f="tired">
      <span class="btn-emoji">😓</span>
      <span class="btn-label">힘들어</span>
      <span class="btn-sub">지친 날</span>
    </button>
    <button class="liquid jua" data-f="angry">
      <span class="btn-emoji">😡</span>
      <span class="btn-label">화나</span>
      <span class="btn-sub">열받는 날</span>
    </button>
  </div>

  <div id="result-card" class="result-card">
    <p id="tagline" class="result-tagline jua" style="display:none;"></p>
    <p id="r" class="result-food jua">---</p>
    <button id="share-btn" class="share-btn jua" style="display:none;">공유하기 🔗</button>
  </div>

  <script src="rand.js"></script>
</body>
</html>
