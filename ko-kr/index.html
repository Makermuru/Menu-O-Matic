<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘 뭐먹지?</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="ko-kr.css">
</head>
<body class="img">
  <audio id="sound" src="tap.mp3"></audio>

  <button id="theme-btn" class="theme-toggle jua" aria-label="테마 전환">🌙 다크</button>

  <h1 class="jua">오늘 뭐먹지?</h1>

  <div class="buttons">
    <button class="liquid jua" data-f="happy">행복 😄</button>
    <button class="liquid jua" data-f="sad">슬픔 😢</button>
    <button class="liquid jua" data-f="tired">힘듦 😓</button>
    <button class="liquid jua" data-f="angry">화남 😡</button>
  </div>

  <div id="result-card" class="result-card">
    <p class="result-label jua">오늘의 메뉴는...</p>
    <p id="r" class="result-food jua">---</p>
    <p id="tagline" class="result-tagline jua" style="display:none;"></p>
    <button id="share-btn" class="share-btn jua" style="display:none;">공유하기 🔗</button>
  </div>

  <script src="rand.js"></script>
</body>
</html>
